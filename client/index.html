<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas (TO-DO)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <div class="card shadow border-0 rounded-4">
                    <div class="card-body p-4">
                        <h1 class="card-title text-center mb-4 fw-bold text-primary">
                            <i class="bi bi-check2-square"></i> Minhas Tarefas
                        </h1>

                        <form id="todo-form" class="mb-4">
                            <div class="input-group">
                                <input type="text" id="todo-input" class="form-control form-control-lg rounded-start-3" placeholder="O que você precisa fazer hoje?" required>
                                <button class="btn btn-primary px-4 rounded-end-3" type="submit">
                                    <i class="bi bi-plus-lg fw-bold"></i>
                                </button>
                            </div>
                        </form>

                        <ul id="todo-list" class="list-group list-group-flush">
                            </ul>

                        <div id="empty-state" class="text-center text-muted py-4">
                            <i class="bi bi-clipboard2-check display-4"></i>
                            <p class="mt-2">Nenhuma tarefa por aqui. Relaxe ou adicione uma!</p>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
